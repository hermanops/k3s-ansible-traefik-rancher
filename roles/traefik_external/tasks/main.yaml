---
# Deploy external Traefik via Helm:
# - stage values/manifests
# - add repo
# - wait for API VIP
# - install chart
# - apply config/dashboard
# - clean up

- name: Create traefik config directory on first master
  file:
    path: /tmp/traefik-ext
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Copy traefik chart values to first master
  template:
    src: "traefik-chart-values.yaml.j2"
    dest: /tmp/traefik-ext/traefik-chart-values.yaml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Copy traefik config to first master
  template:
    src: "traefik-config.yaml.j2"
    dest: /tmp/traefik-ext/traefik-config.yaml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Copy traefik dashboard manifest to first master
  template:
    src: "dashboard.yaml.j2"
    dest: /tmp/traefik-ext/dashboard.yaml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Add traefik helm repo
  kubernetes.core.helm_repository:
    name: traefik
    repo_url: https://helm.traefik.io/traefik

- name: Wait for k3s API server VIP to be available {{ apiserver_endpoint }}
  wait_for:
    host: "{{ apiserver_endpoint }}"
    port: 6443
    delay: 10

- name: Create external-services namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: external-services
    state: present

- name: Deploy traefik using helm
  kubernetes.core.helm:
    name: traefik-external
    chart_ref: traefik/traefik
    release_namespace: kube-system
    values_files:
      - /tmp/traefik-ext/traefik-chart-values.yaml
    state: present

- name: Apply traefik config
  kubernetes.core.k8s:
    state: present
    src: /tmp/traefik-ext/traefik-config.yaml

- name: Apply traefik dashboard
  kubernetes.core.k8s:
    state: present
    src: /tmp/traefik-ext/dashboard.yaml

- name: Clean up traefik tmp dir
  file:
    path: /tmp/traefik-ext/
    state: absent

---
- name: Create cert-manager config directory on first master
  file:
    path: /tmp/cert-manager
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Copy values to first master
  template:
    src: "values.yaml.j2"
    dest: /tmp/cert-manager/values.yaml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Copy internal-ca to first master
  template:
    src: "internal-ca.yaml.j2"
    dest: /tmp/cert-manager/internal-ca.yaml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  when: use_internal_ca | bool

- name: Copy ca-issuer to first master
  template:
    src: "ca-issuer.yaml.j2"
    dest: /tmp/cert-manager/ca-issuer.yaml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  when: use_internal_ca | bool

- name: Add cert-manager helm repo
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: https://charts.jetstack.io

- name: Ensure Python package manager is available for kubernetes.core modules
  become: true
  package:
    name: python3-pip
    state: present

- name: Ensure Kubernetes Python client is installed for kubernetes.core modules
  become: true
  pip:
    name: kubernetes
    executable: pip3

- name: Wait for k3s API server VIP to be available {{ apiserver_endpoint }}
  wait_for:
    host: "{{ apiserver_endpoint }}"
    port: 6443
    delay: 10

- name: Download cert-manager CRDs manifest
  get_url:
    url: https://github.com/jetstack/cert-manager/releases/download/{{ cert_manager_ver }}/cert-manager.crds.yaml
    dest: /tmp/cert-manager/cert-manager.crds.yaml
    mode: "0644"

- name: Apply cert-manager CRDs
  kubernetes.core.k8s:
    state: present
    src: /tmp/cert-manager/cert-manager.crds.yaml
  retries: 2
  delay: 3

- name: Create cert-manager namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: cert-manager
    state: present
  retries: 2
  delay: 3

- name: Apply cert-manager internal-ca configmap
  kubernetes.core.k8s:
    state: present
    src: /tmp/cert-manager/internal-ca.yaml
  retries: 2
  delay: 3
  when: use_internal_ca | bool

- name: Deploy cert-manager using helm
  kubernetes.core.helm:
    name: cert-manager
    chart_ref: jetstack/cert-manager
    chart_version: "{{ cert_manager_ver }}"
    release_namespace: cert-manager
    create_namespace: true
    values_files:
      - /tmp/cert-manager/values.yaml
    wait: true
    state: present

- name: Create internal CA issuer
  kubernetes.core.k8s:
    state: present
    src: /tmp/cert-manager/ca-issuer.yaml
  retries: 2
  delay: 3
  when: use_internal_ca | bool
